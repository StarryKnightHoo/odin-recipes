    <h2>Description</h2>
    <p>This is a very simple butter cookie recipe.</p>
    <h2>Ingredients</h2>
    <ul>
        <li>1 cup butter</li>
        <li>1 cup white sugar</li>
        <li>1 large egg</li>
        <li>2 teaspoons vanilla extract</li>
        <li>2 2/3 cups all-purpose flour</li>
        <li>1/4 teaspoon salt</li>
